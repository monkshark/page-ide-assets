name: Build LLVM/Clang portable bundle

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'LLVM version (default: latest)'
        default: 'latest'
        required: true
      release_tag:
        description: 'GitHub release tag'
        default: 'llvm-bundle'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["18.1.8", "19.1.7", "20.1.6", "21.0.0", "22.1.0"]
        target:
          - { page_os: linux,   page_arch: x86_64,  prefix: "LLVM-",       suffix: "-Linux-X64",                         ext: tar.xz }
          - { page_os: linux,   page_arch: aarch64, prefix: "LLVM-",       suffix: "-Linux-ARM64",                       ext: tar.xz }
          - { page_os: macos,   page_arch: aarch64, prefix: "LLVM-",       suffix: "-macOS-ARM64",                       ext: tar.xz }
          - { page_os: windows, page_arch: x86_64,  prefix: "clang+llvm-", suffix: "-x86_64-pc-windows-msvc",            ext: tar.xz }
    steps:
      - name: Download LLVM release
        id: download
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ matrix.version }}"
          tag="llvmorg-${ver}"
          asset_name="${{ matrix.target.prefix }}${ver}${{ matrix.target.suffix }}.${{ matrix.target.ext }}"
          url="https://github.com/llvm/llvm-project/releases/download/${tag}/${asset_name}"
          echo "GET $url"
          http_code=$(curl -sSL -o upstream.archive -w '%{http_code}' "$url")
          if [ "$http_code" != "200" ]; then
            echo "::warning::No LLVM asset $asset_name (HTTP $http_code) — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ls -lh upstream.archive
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Repack as PAGE bundle
        if: steps.download.outputs.skip != 'true'
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ matrix.version }}"
          mkdir bundle
          tar -xf upstream.archive -C bundle --strip-components=1

          if [ ! -f bundle/bin/clang ] && [ ! -f bundle/bin/clang.exe ]; then
            echo "::error::clang binary not found after extraction"
            ls bundle/bin/ | head -20
            exit 1
          fi

          # Trim aggressively to fit GitHub 2GB asset limit
          # Keep only essential tools for clangd LSP + clang compilation
          keep_pattern='^(clang|clang\+\+|clangd|clang-cl|clang-cpp|lld|lld-link|ld\.lld|ld64\.lld|wasm-ld|llvm-ar|llvm-ranlib|llvm-objcopy|llvm-strip|llvm-nm|llvm-readelf|llvm-config|llvm-dwp)(\.exe)?$'
          # Also keep clang-XX (versioned symlinks/binaries)
          extra_pattern='^(clang|clang\+\+)-[0-9]+(\.exe)?$'
          for f in bundle/bin/*; do
            [ -e "$f" ] || continue
            name=$(basename "$f")
            if echo "$name" | grep -qE "$keep_pattern|$extra_pattern"; then
              continue
            fi
            rm -f "$f"
          done
          # Remove docs, lldb, python, scan-* (unused), debug runtime libs
          rm -rf bundle/lib/python* bundle/lib/lldb* bundle/lib/cmake bundle/lib/Remarks* bundle/lib/objects-* 2>/dev/null || true
          rm -rf bundle/share 2>/dev/null || true
          rm -rf bundle/libexec 2>/dev/null || true
          rm -rf bundle/include/lldb bundle/include/lld 2>/dev/null || true
          # Remove static archives (we only need dynamic libs)
          find bundle/lib -name "*.a" -delete 2>/dev/null || true
          # Strip debug symbols
          if [ "${{ matrix.target.page_os }}" != "windows" ]; then
            find bundle/bin -type f -exec strip --strip-unneeded {} + 2>/dev/null || true
            find bundle/lib -name "*.so*" -exec strip --strip-unneeded {} + 2>/dev/null || true
            find bundle/lib -name "*.dylib" -exec strip --strip-unneeded {} + 2>/dev/null || true
          fi
          echo "Post-trim sizes:"
          du -sh bundle/bin bundle/lib bundle/include 2>/dev/null || true

          cat > bundle/page-bundle-manifest.json <<EOF
          {
            "llvm_version": "$ver",
            "page_os": "${{ matrix.target.page_os }}",
            "page_arch": "${{ matrix.target.page_arch }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          outname="page-cpp-llvm-${{ matrix.target.page_os }}-${{ matrix.target.page_arch }}-${ver}.tar.gz"
          tar --use-compress-program="gzip -9" -cf "$outname" -C bundle .
          ls -lh "$outname"
          size=$(stat -c%s "$outname" 2>/dev/null || stat -f%z "$outname")
          echo "Final bundle size: $size bytes"
          if [ "$size" -gt 2147483647 ]; then
            echo "::error::Bundle exceeds GitHub 2GB asset limit ($size bytes)"
            exit 1
          fi
          echo "outname=$outname" >> "$GITHUB_OUTPUT"

      - name: Upload as release asset
        if: steps.download.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || 'llvm-bundle' }}
          name: LLVM/Clang portable bundles
          make_latest: false
          body: |
            Portable LLVM/Clang toolchain for PAGE IDE.
            Includes clang, clang++, clangd, lld.
            Note: lldb and other large unused components removed to fit GitHub asset size limit.
          files: ${{ steps.pack.outputs.outname }}
          fail_on_unmatched_files: true
