name: Build Swift toolchain bundle

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag'
        default: 'swift-toolchain-bundle'
        required: true

permissions:
  contents: write

jobs:
  build-unix:
    runs-on: ${{ matrix.target.page_os == 'macos' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        version: ["5.10.1", "6.0.3"]
        target:
          - { page_os: linux,   page_arch: x86_64,  url_path: "ubuntu2204",        suffix: "ubuntu22.04" }
          - { page_os: linux,   page_arch: aarch64, url_path: "ubuntu2204-aarch64", suffix: "ubuntu22.04-aarch64" }
          - { page_os: macos,   page_arch: aarch64, url_path: "xcode",              suffix: "osx" }
    steps:
      - name: Download Swift toolchain
        id: download
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ matrix.version }}"
          tag="swift-${ver}-RELEASE"
          ext="tar.gz"
          if [ "${{ matrix.target.page_os }}" = "macos" ]; then ext="pkg"; fi
          asset_name="${tag}-${{ matrix.target.suffix }}.${ext}"
          url="https://download.swift.org/swift-${ver}-release/${{ matrix.target.url_path }}/${tag}/${asset_name}"
          echo "GET $url"
          http_code=$(curl -sSL -o upstream.archive -w '%{http_code}' "$url")
          if [ "$http_code" != "200" ]; then
            echo "::warning::No Swift asset $asset_name (HTTP $http_code) — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ls -lh upstream.archive
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "ext=$ext" >> "$GITHUB_OUTPUT"

      - name: Repack as PAGE bundle (Linux tarball)
        if: steps.download.outputs.skip != 'true' && matrix.target.page_os == 'linux'
        id: pack-linux
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ matrix.version }}"
          mkdir bundle
          tar -xf upstream.archive -C bundle --strip-components=1
          if [ ! -f bundle/usr/bin/sourcekit-lsp ]; then
            echo "::error::sourcekit-lsp binary not found after extraction"
            ls bundle/usr/bin | head -20
            exit 1
          fi
          cat > bundle/page-bundle-manifest.json <<EOF
          {"swift_version":"$ver","page_os":"${{ matrix.target.page_os }}","page_arch":"${{ matrix.target.page_arch }}","built_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF
          outname="page-swift-toolchain-${{ matrix.target.page_os }}-${{ matrix.target.page_arch }}-${ver}.tar.gz"
          tar -czf "$outname" -C bundle .
          ls -lh "$outname"
          echo "outname=$outname" >> "$GITHUB_OUTPUT"

      - name: Repack as PAGE bundle (macOS pkg)
        if: steps.download.outputs.skip != 'true' && matrix.target.page_os == 'macos'
        id: pack-macos
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ matrix.version }}"
          mkdir bundle
          # Native pkgutil on macOS runner expands the .pkg cleanly
          pkgutil --expand-full upstream.archive bundle/expanded
          # Swift macOS pkg layout: bundle/expanded/swift-X.Y.Z-RELEASE-osx-package.pkg/Payload/usr/bin/sourcekit-lsp
          lsp=$(find bundle/expanded -type f -name sourcekit-lsp | head -1)
          if [ -z "$lsp" ]; then
            echo "::error::sourcekit-lsp not found after pkg extract"
            ls bundle/expanded | head -20
            exit 1
          fi
          # toolchain root = parent of usr/ (i.e. parent of dirname(dirname(lsp)))
          usr_dir=$(dirname "$(dirname "$lsp")")
          tc=$(dirname "$usr_dir")
          echo "toolchain root: $tc"
          mkdir final
          cp -R "$tc/." final/
          if [ ! -f final/usr/bin/sourcekit-lsp ]; then
            echo "::error::sourcekit-lsp missing in final bundle"
            ls final/usr/bin 2>/dev/null | head -10
            exit 1
          fi
          cat > final/page-bundle-manifest.json <<EOF
          {"swift_version":"$ver","page_os":"${{ matrix.target.page_os }}","page_arch":"${{ matrix.target.page_arch }}","built_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF
          outname="page-swift-toolchain-${{ matrix.target.page_os }}-${{ matrix.target.page_arch }}-${ver}.tar.gz"
          tar -czf "$outname" -C final .
          ls -lh "$outname"
          echo "outname=$outname" >> "$GITHUB_OUTPUT"

      - name: Upload as release asset
        if: steps.download.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || 'swift-toolchain-bundle' }}
          name: Swift toolchain bundles
          make_latest: false
          body: |
            Portable Swift toolchain for PAGE IDE.
            Includes swift, swiftc, sourcekit-lsp.
          files: |
            ${{ steps.pack-linux.outputs.outname }}
            ${{ steps.pack-macos.outputs.outname }}
          fail_on_unmatched_files: false

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        version: ["5.10.1", "6.0.3"]
    steps:
      - name: Download and install Swift
        shell: pwsh
        run: |
          $ver = "${{ matrix.version }}"
          $tag = "swift-$ver-RELEASE"
          $url = "https://download.swift.org/swift-$ver-release/windows10/$tag/$tag-windows10.exe"
          Write-Host "GET $url"
          Invoke-WebRequest -Uri $url -OutFile swift-installer.exe
          Get-Item swift-installer.exe | Format-List Length
          Write-Host "Running silent install..."
          Start-Process -FilePath .\swift-installer.exe -ArgumentList "-q" -Wait -NoNewWindow
          $swiftRoot = "C:\Program Files\Swift"
          if (-not (Test-Path $swiftRoot)) {
            $swiftRoot = "$env:LOCALAPPDATA\Programs\Swift"
          }
          if (-not (Test-Path $swiftRoot)) {
            Write-Error "Swift install directory not found"
            exit 1
          }
          Write-Host "Swift root: $swiftRoot"
          Get-ChildItem $swiftRoot
          echo "SWIFT_ROOT=$swiftRoot" >> $env:GITHUB_ENV

      - name: Locate sourcekit-lsp
        shell: pwsh
        run: |
          $lsp = Get-ChildItem -Path "$env:SWIFT_ROOT" -Recurse -Filter "sourcekit-lsp.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $lsp) {
            Write-Error "sourcekit-lsp.exe not found under $env:SWIFT_ROOT"
            exit 1
          }
          Write-Host "Found: $($lsp.FullName)"
          $tcRoot = $lsp.Directory.Parent.Parent.FullName
          Write-Host "Toolchain root: $tcRoot"
          echo "TC_ROOT=$tcRoot" >> $env:GITHUB_ENV

      - name: Bundle VC++ runtime DLLs
        shell: pwsh
        run: |
          $sys32 = "$env:SystemRoot\System32"
          $dlls = @(
            "vcruntime140.dll",
            "vcruntime140_1.dll",
            "msvcp140.dll",
            "msvcp140_1.dll",
            "msvcp140_2.dll",
            "concrt140.dll"
          )
          $dest = "vcredist-payload"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          foreach ($d in $dlls) {
            $src = Join-Path $sys32 $d
            if (Test-Path $src) {
              Copy-Item $src $dest
              Write-Host "bundled $d"
            } else {
              Write-Host "skip $d (not on runner)"
            }
          }
          echo "VCREDIST_DIR=$((Get-Item $dest).FullName)" >> $env:GITHUB_ENV

      - name: Locate Swift runtime DLLs
        shell: pwsh
        run: |
          # sourcekit-lsp.exe is itself a Swift program: it needs the Swift standard-library
          # runtime DLLs (swiftCore.dll, Foundation.dll, ...) to even start. On Windows these
          # live under Runtimes\<ver>\usr\bin, NOT inside the toolchain's usr\bin, so the bundle
          # must pull them in explicitly.
          $core = Get-ChildItem -Path "$env:SWIFT_ROOT" -Recurse -Filter "swiftCore.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $core) {
            Write-Error "swiftCore.dll not found under $env:SWIFT_ROOT — Swift runtime missing"
            exit 1
          }
          $runtimeBin = $core.Directory.FullName
          Write-Host "Swift runtime bin: $runtimeBin"
          Get-ChildItem $runtimeBin -Filter *.dll | ForEach-Object { Write-Host "  $($_.Name)" }
          echo "RUNTIME_BIN=$runtimeBin" >> $env:GITHUB_ENV

      - name: Stage Swift Windows SDK
        shell: pwsh
        run: |
          # swiftc / sourcekit-lsp need the Swift Windows SDK — the standard-library .swiftmodule
          # tree (Swift.swiftmodule, Foundation.swiftmodule, ...) — to resolve imports and provide
          # semantic completion. It lives under Platforms\<ver>\Windows.platform\Developer\SDKs\Windows.sdk,
          # often behind directory junctions that Get-ChildItem -Recurse skips by default. Walk the
          # known layout explicitly, fall back to a forced recursive search, then copy into a plain
          # staging dir (dereferencing junctions) so the bash packaging step gets real files.
          $platforms = Join-Path $env:SWIFT_ROOT "Platforms"
          $sdk = $null
          foreach ($p in (Get-ChildItem $platforms -Directory -ErrorAction SilentlyContinue)) {
            $cand = Join-Path $p.FullName "Windows.platform\Developer\SDKs\Windows.sdk"
            if (Test-Path $cand) { $sdk = (Get-Item $cand).FullName; break }
          }
          if (-not $sdk) {
            $found = Get-ChildItem -Path "$env:SWIFT_ROOT" -Recurse -Force -Directory -Filter "Windows.sdk" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $sdk = $found.FullName }
          }
          if (-not $sdk) {
            Write-Error "Windows.sdk not found under $env:SWIFT_ROOT — Swift stdlib modules missing"
            Get-ChildItem $platforms -Recurse -Directory -ErrorAction SilentlyContinue | Select-Object -First 30 FullName | ForEach-Object { Write-Host "  $($_.FullName)" }
            exit 1
          }
          Write-Host "Swift Windows SDK: $sdk"
          Write-Host "SDK top-level entries:"
          Get-ChildItem $sdk -Force -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Mode) $($_.Name)" }
          # robocopy dereferences directory junctions (the SDK's usr/ tree commonly sits behind one),
          # copying real file content into a plain staging dir. Exit codes < 8 mean success.
          $stage = Join-Path $env:GITHUB_WORKSPACE "sdk-stage"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage | Out-Null
          robocopy $sdk $stage /E /NFL /NDL /NJH /NJS /NP | Out-Null
          if ($LASTEXITCODE -ge 8) { Write-Error "robocopy failed (exit $LASTEXITCODE)"; exit 1 }
          $global:LASTEXITCODE = 0
          $staged = Get-ChildItem -Path $stage -Recurse -Force -Filter "Swift.swiftmodule" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $staged) {
            Write-Error "Swift.swiftmodule not present in staged SDK — stdlib modules missing"
            Write-Host "Staged tree (first 60 dirs):"
            Get-ChildItem $stage -Recurse -Force -Directory -ErrorAction SilentlyContinue | Select-Object -First 60 | ForEach-Object { Write-Host "  $($_.FullName.Substring($stage.Length))" }
            exit 1
          }
          Write-Host "Staged Swift.swiftmodule at: $($staged.FullName.Substring($stage.Length))"
          echo "SWIFT_SDK_STAGE=$($stage -replace '\\','/')" >> $env:GITHUB_ENV

      - name: Package PAGE bundle (Windows)
        id: pack-windows
        shell: bash
        run: |
          set -euo pipefail
          ver="${{ matrix.version }}"
          mkdir -p bundle
          # Swift Windows toolchain layout: TC_ROOT/usr/{bin,lib,share}
          cp -R "${TC_ROOT}/usr" "bundle/"
          if [ ! -f "bundle/usr/bin/sourcekit-lsp.exe" ]; then
            echo "::error::sourcekit-lsp.exe missing in bundle"
            echo "TC_ROOT contents:"
            ls "${TC_ROOT}" | head -20
            echo "bundle/usr contents:"
            ls bundle/usr 2>/dev/null | head -20
            exit 1
          fi
          # Bundle vcruntime DLLs next to sourcekit-lsp.exe so they load even without VC++ Redistributable installed
          for dll in "${VCREDIST_DIR}"/*.dll; do
            [ -f "$dll" ] || continue
            cp "$dll" bundle/usr/bin/
          done
          # Bundle Swift stdlib runtime DLLs (swiftCore.dll, Foundation.dll, ...) so sourcekit-lsp.exe
          # can start without a separate Swift Runtimes install on the user machine.
          for dll in "${RUNTIME_BIN}"/*.dll; do
            [ -f "$dll" ] || continue
            cp "$dll" bundle/usr/bin/
          done
          if [ ! -f "bundle/usr/bin/swiftCore.dll" ]; then
            echo "::error::swiftCore.dll missing from bundle after runtime copy"
            ls bundle/usr/bin | grep -i swift | head -20
            exit 1
          fi
          # Bundle the Swift Windows SDK (stdlib .swiftmodule tree) under bundle/sdk so swiftc and
          # sourcekit-lsp can resolve Swift/Foundation imports. PAGE sets SDKROOT to <install>/sdk.
          mkdir -p bundle/sdk
          cp -R "${SWIFT_SDK_STAGE}/." bundle/sdk/
          if [ -z "$(find bundle/sdk -name Swift.swiftmodule -print -quit 2>/dev/null)" ]; then
            echo "::error::Swift.swiftmodule missing from bundle/sdk after SDK copy"
            find bundle/sdk -maxdepth 6 -name '*.swiftmodule' 2>/dev/null | head -20
            exit 1
          fi
          cat > bundle/page-bundle-manifest.json <<EOF
          {"swift_version":"$ver","page_os":"windows","page_arch":"x86_64","built_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","vcruntime_bundled":true,"swift_runtime_bundled":true,"swift_sdk_bundled":true}
          EOF
          outname="page-swift-toolchain-windows-x86_64-${ver}.tar.gz"
          tar -czf "$outname" -C bundle .
          ls -lh "$outname"
          echo "outname=$outname" >> "$GITHUB_OUTPUT"

      - name: Upload Windows bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || 'swift-toolchain-bundle' }}
          name: Swift toolchain bundles
          make_latest: false
          body: |
            Portable Swift toolchain for PAGE IDE.
            Includes swift, swiftc, sourcekit-lsp.
            Windows bundle includes vcruntime + Swift stdlib runtime DLLs + the Swift Windows SDK (stdlib .swiftmodule tree under sdk/). Self-contained: sourcekit-lsp runs and resolves Swift/Foundation imports without a separate Swift install. PAGE sets SDKROOT to <install>/sdk.
          files: ${{ steps.pack-windows.outputs.outname }}
          fail_on_unmatched_files: true
