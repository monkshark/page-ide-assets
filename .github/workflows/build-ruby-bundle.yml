name: Build Ruby + solargraph bundle (Windows)

on:
  workflow_dispatch:
    inputs:
      ruby_version:
        description: 'Ruby version (RubyInstaller-devkit)'
        default: '3.4.6'
        required: true
      solargraph_version:
        description: 'solargraph gem version (last prism-free release)'
        default: '0.55.4'
        required: true
      rbs_version:
        description: 'rbs gem version pin (prism-free)'
        default: '3.3.0'
        required: true
      release_tag:
        description: 'GitHub release tag (groups Ruby version assets)'
        default: 'ruby-bundle'
        required: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      RUBY_INSTALL_DIR: ${{ github.workspace }}\ruby-build
    steps:
      - name: Checkout (for release upload context)
        uses: actions/checkout@v4

      - name: Download RubyInstaller-devkit
        shell: pwsh
        run: |
          $version = "${{ inputs.ruby_version }}"
          $url = "https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-$version-1/rubyinstaller-devkit-$version-1-x64.exe"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile installer.exe -UseBasicParsing

      - name: Silent install Ruby + DevKit
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:RUBY_INSTALL_DIR | Out-Null
          $proc = Start-Process -FilePath .\installer.exe `
            -ArgumentList '/VERYSILENT','/CURRENTUSER','/SUPPRESSMSGBOXES','/NORESTART','/NOICONS',"/DIR=$env:RUBY_INSTALL_DIR",'/TASKS=!modpath,!assocfiles,defaultutf8' `
            -Wait -PassThru
          if ($proc.ExitCode -ne 0) { throw "RubyInstaller exit code $($proc.ExitCode)" }
          & "$env:RUBY_INSTALL_DIR\bin\ruby.exe" --version

      - name: Run ridk install 1 3 (MSYS2 + MinGW UCRT64)
        shell: cmd
        run: |
          "%RUBY_INSTALL_DIR%\bin\ridk.cmd" install 1 3

      - name: Verify toolchain (compile + link hello.c)
        shell: pwsh
        run: |
          $gcc = "$env:RUBY_INSTALL_DIR\msys64\ucrt64\bin\gcc.exe"
          $ld = "$env:RUBY_INSTALL_DIR\msys64\ucrt64\bin\ld.exe"
          $stdio = "$env:RUBY_INSTALL_DIR\msys64\ucrt64\include\stdio.h"
          foreach ($p in @($gcc, $ld, $stdio)) {
            if (-not (Test-Path $p)) { throw "Missing $p — ridk install did not deploy MinGW UCRT64" }
          }
          & $gcc --version
          $smokeDir = Join-Path $env:RUNNER_TEMP 'gcc-smoke'
          New-Item -ItemType Directory -Force -Path $smokeDir | Out-Null
          $src = Join-Path $smokeDir 'hello.c'
          $exe = Join-Path $smokeDir 'hello.exe'
          @'
          #include <stdio.h>
          int main(void) { puts("hello"); return 0; }
          '@ | Out-File -Encoding ascii $src
          & $gcc $src -o $exe
          if ($LASTEXITCODE -ne 0) { throw "gcc smoke compile failed (exit $LASTEXITCODE) — cc1 / ld backend missing" }
          $out = & $exe
          if ($out -ne 'hello') { throw "smoke binary output mismatch: '$out'" }
          Write-Host "==> gcc smoke compile OK"

      - name: Install gemhome (rbs prism-free pin + solargraph)
        shell: pwsh
        run: |
          $rubyRoot = $env:RUBY_INSTALL_DIR
          $gemHome = "$rubyRoot\gemhome"
          New-Item -ItemType Directory -Force -Path $gemHome | Out-Null
          $env:GEM_HOME = $gemHome
          $env:GEM_PATH = $gemHome
          $env:MSYSTEM = 'UCRT64'
          $env:MSYSTEM_PREFIX = '/ucrt64'
          $env:MSYSTEM_CARCH = 'x86_64'
          $env:MSYSTEM_CHOST = 'x86_64-w64-mingw32'
          $env:MINGW_CHOST = 'x86_64-w64-mingw32'
          $env:MINGW_PREFIX = '/ucrt64'
          $env:MINGW_PACKAGE_PREFIX = 'mingw-w64-ucrt-x86_64'
          $env:RI_DEVKIT = "$rubyRoot\msys64"
          $env:PKG_CONFIG_PATH = '/ucrt64/lib/pkgconfig:/ucrt64/share/pkgconfig'
          $env:PATH = "$rubyRoot\msys64\ucrt64\bin;$rubyRoot\msys64\usr\bin;$rubyRoot\bin;$gemHome\bin;$env:PATH"

          $rbsVersion = "${{ inputs.rbs_version }}"
          Write-Host "==> gem install --no-document --version $rbsVersion rbs"
          & "$rubyRoot\bin\gem.cmd" install --no-document --version $rbsVersion rbs
          if ($LASTEXITCODE -ne 0) { throw "gem install rbs exit $LASTEXITCODE" }

          $solargraphVersion = "${{ inputs.solargraph_version }}"
          Write-Host "==> gem install --no-document --conservative --version $solargraphVersion solargraph"
          & "$rubyRoot\bin\gem.cmd" install --no-document --conservative --version $solargraphVersion solargraph
          if ($LASTEXITCODE -ne 0) { throw "gem install solargraph exit $LASTEXITCODE" }

          $solargraphBat = "$gemHome\bin\solargraph.bat"
          if (-not (Test-Path $solargraphBat)) { throw "solargraph.bat missing after install: $solargraphBat" }
          Write-Host "==> solargraph version check"
          & $solargraphBat --version

      - name: Write PAGE manifest into bundle
        shell: pwsh
        run: |
          $manifest = @{
            ruby_version       = "${{ inputs.ruby_version }}"
            solargraph_version = "${{ inputs.solargraph_version }}"
            rbs_version        = "${{ inputs.rbs_version }}"
            built_at           = (Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')
            built_by           = "github-actions / ${{ github.workflow }} / ${{ github.run_id }}"
          } | ConvertTo-Json
          $manifest | Out-File -Encoding utf8 "$env:RUBY_INSTALL_DIR\page-bundle-manifest.json"

      - name: Compress full Ruby tree
        shell: pwsh
        run: |
          $version = "${{ inputs.ruby_version }}"
          $zip = "$env:GITHUB_WORKSPACE\page-ruby-solargraph-windows-x86_64-$version.zip"
          Write-Host "Compressing $env:RUBY_INSTALL_DIR -> $zip"
          Compress-Archive -Path "$env:RUBY_INSTALL_DIR\*" -DestinationPath $zip -CompressionLevel Optimal
          $size = (Get-Item $zip).Length / 1MB
          Write-Host ("zip size: {0:N1} MB" -f $size)

      - name: Upload as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Ruby + solargraph bundles
          make_latest: false
          body: |
            Prebuilt Ruby + MSYS2 UCRT64 + solargraph + rbs bundles, auto-fetched by
            [PAGE IDE](https://github.com/monkshark/page-ide)'s `RubyBootstrapInstaller`.

            Assets are added to this tag as new Ruby versions are built. Each asset is
            a flat zip whose root is the Ruby install tree (`bin/`, `msys64/`, `gemhome/`,
            `page-bundle-manifest.json`).

            See the repository [README](https://github.com/monkshark/page-ide-assets#readme)
            for the asset naming convention and override env vars.
          files: page-ruby-solargraph-windows-x86_64-${{ inputs.ruby_version }}.zip
          fail_on_unmatched_files: true
