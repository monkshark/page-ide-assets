name: Build rust-analyzer bundle

on:
  workflow_dispatch:
    inputs:
      min_version:
        description: 'Minimum rust-analyzer release date to build (inclusive, e.g. 2024-01-01).'
        default: '2024-01-01'
        required: true
      release_tag:
        description: 'GitHub release tag (groups rust-analyzer bundles)'
        default: 'rust-analyzer-bundle'
        required: true

permissions:
  contents: write

jobs:
  enumerate:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.list.outputs.versions }}
    steps:
      - name: Fetch rust-analyzer release tags from GitHub
        id: list
        shell: bash
        run: |
          set -euo pipefail
          all_tags=''
          page=1
          while :; do
            resp=$(curl -sSfL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/rust-lang/rust-analyzer/releases?per_page=100&page=$page")
            chunk=$(echo "$resp" | jq -r '.[] | select(.prerelease == false and .draft == false) | .tag_name' || true)
            if [ -z "$chunk" ]; then break; fi
            all_tags=$(printf '%s\n%s\n' "$all_tags" "$chunk")
            page=$((page + 1))
            if [ "$page" -gt 10 ]; then break; fi
          done
          dated=$(echo "$all_tags" | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' | sort -u)
          min='${{ inputs.min_version }}'
          filtered=$(echo "$dated" | awk -v min="$min" '{ if ($0 >= min) print $0 }' | sort)
          if [ -z "$filtered" ]; then
            echo "::error::No rust-analyzer releases matched min=$min"
            exit 1
          fi
          json=$(echo "$filtered" | jq -R . | jq -s -c .)
          echo "versions=$json" >> "$GITHUB_OUTPUT"
          echo "Versions ($(echo "$filtered" | wc -l) total): $json"

  build:
    needs: enumerate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        version: ${{ fromJSON(needs.enumerate.outputs.versions) }}
        target:
          - { page_os: linux,   page_arch: x86_64,  ra_triple: x86_64-unknown-linux-gnu }
          - { page_os: linux,   page_arch: aarch64, ra_triple: aarch64-unknown-linux-gnu }
          - { page_os: macos,   page_arch: x86_64,  ra_triple: x86_64-apple-darwin }
          - { page_os: macos,   page_arch: aarch64, ra_triple: aarch64-apple-darwin }
          - { page_os: windows, page_arch: x86_64,  ra_triple: x86_64-pc-windows-msvc }
    steps:
      - name: Download rust-analyzer binary
        id: download
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/rust-lang/rust-analyzer/releases/download/${{ matrix.version }}/rust-analyzer-${{ matrix.target.ra_triple }}.gz"
          echo "GET $url"
          http_code=$(curl -sSL -o upstream.gz -w '%{http_code}' "$url")
          if [ "$http_code" != "200" ]; then
            echo "::warning::No binary for ${{ matrix.target.ra_triple }} at ${{ matrix.version }} (HTTP $http_code) — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ls -lh upstream.gz
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Repack as PAGE bundle
        if: steps.download.outputs.skip != 'true'
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          outname="page-rust-analyzer-${{ matrix.target.page_os }}-${{ matrix.target.page_arch }}-${{ matrix.version }}.gz"
          cp upstream.gz "$outname"
          ls -lh "$outname"
          echo "outname=$outname" >> "$GITHUB_OUTPUT"

      - name: Upload as release asset
        if: steps.download.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: rust-analyzer bundles
          make_latest: false
          body: |
            Prebuilt rust-analyzer binaries, auto-fetched by [PAGE IDE](https://github.com/monkshark/page-ide)'s `RustAnalyzerInstaller`.

            Assets are added to this tag as new rust-analyzer releases are built.
            Each asset is the upstream gzipped binary renamed to follow the PAGE
            asset naming convention.

            See the repository [README](https://github.com/monkshark/page-ide-assets#readme).
          files: ${{ steps.pack.outputs.outname }}
          fail_on_unmatched_files: true
