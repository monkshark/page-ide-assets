name: Build Flutter SDK bundle

on:
  workflow_dispatch:
    inputs:
      min_version:
        description: 'Minimum Flutter stable version to build (inclusive, e.g. 3.0.0).'
        default: '3.0.0'
        required: true
      release_tag:
        description: 'GitHub release tag (groups Flutter SDK bundles)'
        default: 'flutter-sdk-bundle'
        required: true

permissions:
  contents: write

jobs:
  enumerate:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.list.outputs.targets }}
    steps:
      - name: Fetch stable releases from each platform manifest
        id: list
        shell: bash
        run: |
          set -euo pipefail
          min='${{ inputs.min_version }}'
          base='https://storage.googleapis.com/flutter_infra_release/releases'
          merged='[]'
          for upstream_os in linux macos windows; do
            manifest=$(curl -sSfL "$base/releases_${upstream_os}.json")
            entries=$(echo "$manifest" | jq -c --arg minv "$min" '
              def vercmp(a; b):
                ((a / ".") | map(tonumber)) as $av
                | ((b / ".") | map(tonumber)) as $bv
                | [$av, $bv]
                | (.[0] | length) as $an
                | (.[1] | length) as $bn
                | (if $an < $bn then $an else $bn end) as $lim
                | reduce range(0; $lim) as $i (0;
                    if . != 0 then . else ($av[$i] - $bv[$i]) end);
              .releases
              | map(select(.channel == "stable"))
              | map(select((.version | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")) and (vercmp(.version; $minv) >= 0)))
              | map({
                  version,
                  upstream_os: "'"$upstream_os"'",
                  dart_sdk_arch: (.dart_sdk_arch // "x64"),
                  archive
                })
            ')
            merged=$(echo "$merged $entries" | jq -c -s 'add')
          done
          targets=$(echo "$merged" | jq -c '
            def map_os(o; a):
              if o == "linux" and a == "x64" then {page_os: "linux",   page_arch: "x86_64",  ext: "tar.gz"}
              elif o == "linux" and a == "arm64" then {page_os: "linux",   page_arch: "aarch64", ext: "tar.gz"}
              elif o == "macos" and a == "x64" then {page_os: "macos",   page_arch: "x86_64",  ext: "tar.gz"}
              elif o == "macos" and a == "arm64" then {page_os: "macos",   page_arch: "aarch64", ext: "tar.gz"}
              elif o == "windows" and a == "x64" then {page_os: "windows", page_arch: "x86_64",  ext: "zip"}
              else null end;
            map(. as $r
              | map_os($r.upstream_os; $r.dart_sdk_arch) as $m
              | select($m != null)
              | $m + {version: $r.version, upstream_os: $r.upstream_os, dart_sdk_arch: $r.dart_sdk_arch, archive: $r.archive})
            | sort_by(.version, .page_os, .page_arch)
          ')
          count=$(echo "$targets" | jq 'length')
          if [ "$count" -lt 1 ]; then
            echo "::error::No Flutter targets matched min=$min"
            exit 1
          fi
          echo "$targets" | jq -r '.[] | "\(.version) \(.page_os) \(.page_arch)"' | head -n 10
          echo "Total targets: $count"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  build:
    needs: enumerate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        target: ${{ fromJSON(needs.enumerate.outputs.targets) }}
    steps:
      - name: Download Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          url="https://storage.googleapis.com/flutter_infra_release/releases/${{ matrix.target.archive }}"
          echo "GET $url"
          curl -sSfL -o upstream.bin "$url"
          ls -lh upstream.bin

      - name: Repack with PAGE manifest
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir bundle
          case '${{ matrix.target.archive }}' in
            *.tar.xz)
              tar -xJf upstream.bin -C bundle ;;
            *.zip)
              unzip -q upstream.bin -d bundle ;;
            *)
              echo "::error::Unknown archive ${{ matrix.target.archive }}"
              exit 1 ;;
          esac
          cat > bundle/page-bundle-manifest.json <<EOF
          {
            "flutter_version": "${{ matrix.target.version }}",
            "upstream_os": "${{ matrix.target.upstream_os }}",
            "dart_sdk_arch": "${{ matrix.target.dart_sdk_arch }}",
            "page_os": "${{ matrix.target.page_os }}",
            "page_arch": "${{ matrix.target.page_arch }}",
            "upstream_url": "https://storage.googleapis.com/flutter_infra_release/releases/${{ matrix.target.archive }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "built_by": "github-actions / ${{ github.workflow }} / ${{ github.run_id }}"
          }
          EOF
          outname="page-flutter-sdk-${{ matrix.target.page_os }}-${{ matrix.target.page_arch }}-${{ matrix.target.version }}.${{ matrix.target.ext }}"
          case "${{ matrix.target.ext }}" in
            tar.gz)
              tar -czf "$outname" -C bundle . ;;
            zip)
              (cd bundle && zip -qr "../$outname" .) ;;
          esac
          ls -lh "$outname"
          echo "outname=$outname" >> "$GITHUB_OUTPUT"

      - name: Upload as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Flutter SDK bundles
          make_latest: false
          body: |
            Prebuilt Flutter SDK bundles, auto-fetched by [PAGE IDE](https://github.com/monkshark/page-ide)'s `FlutterSdkInstaller`.

            Assets are added to this tag as new Flutter stable releases are
            built. Each asset wraps the upstream Flutter SDK archive with a
            `page-bundle-manifest.json` and is repacked as `tar.gz` on
            Unix-like OS or `zip` on Windows per the asset naming convention.

            The bundled Dart language server lives at
            `flutter/bin/cache/dart-sdk/bin/dart language-server`. PAGE IDE's
            Flutter language adapter invokes it through that path so Flutter
            projects share the IDE's Dart LSP infrastructure.

            See the repository [README](https://github.com/monkshark/page-ide-assets#readme).
          files: ${{ steps.pack.outputs.outname }}
          fail_on_unmatched_files: true
