name: Build Metals bundle

on:
  workflow_dispatch:
    inputs:
      min_version:
        description: 'Minimum Metals stable version to build (inclusive, e.g. 1.6.0).'
        default: '1.6.0'
        required: true
      jre_version:
        description: 'Temurin JRE major version to bundle (e.g. 21).'
        default: '21'
        required: true
      release_tag:
        description: 'GitHub release tag (groups Metals bundles)'
        default: 'metals-bundle'
        required: true

permissions:
  contents: write

jobs:
  enumerate:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.list.outputs.versions }}
    steps:
      - name: Fetch stable Metals versions from Maven Central
        id: list
        shell: bash
        run: |
          set -euo pipefail
          xml=$(curl -sSfL 'https://repo1.maven.org/maven2/org/scalameta/metals_2.13/maven-metadata.xml')
          all=$(echo "$xml" \
            | grep -oE '<version>[^<]+</version>' \
            | sed -E 's|</?version>||g' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -u)
          min='${{ inputs.min_version }}'
          filtered=$(echo "$all" | awk -v min="$min" '
            function vercmp(a, b,   ai, bi, n, m, i, lim) {
              n = split(a, ai, ".")
              m = split(b, bi, ".")
              lim = (n < m) ? n : m
              for (i = 1; i <= lim; i++) {
                if (ai[i]+0 < bi[i]+0) return -1
                if (ai[i]+0 > bi[i]+0) return 1
              }
              return n - m
            }
            { if (vercmp($0, min) >= 0) print $0 }
          ' | sort -V)
          if [ -z "$filtered" ]; then
            echo "::error::No Metals versions matched min=$min"
            exit 1
          fi
          json=$(echo "$filtered" | jq -R . | jq -s -c .)
          echo "versions=$json" >> "$GITHUB_OUTPUT"
          echo "Versions ($(echo "$filtered" | wc -l) total): $json"

  build:
    needs: enumerate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        version: ${{ fromJSON(needs.enumerate.outputs.versions) }}
        target:
          - { page_os: linux,   page_arch: x86_64,  adoptium_os: linux,   adoptium_arch: x64,     ext: tar.gz }
          - { page_os: linux,   page_arch: aarch64, adoptium_os: linux,   adoptium_arch: aarch64, ext: tar.gz }
          - { page_os: macos,   page_arch: x86_64,  adoptium_os: mac,     adoptium_arch: x64,     ext: tar.gz }
          - { page_os: macos,   page_arch: aarch64, adoptium_os: mac,     adoptium_arch: aarch64, ext: tar.gz }
          - { page_os: windows, page_arch: x86_64,  adoptium_os: windows, adoptium_arch: x64,     ext: zip }
    steps:
      - name: Install Coursier
        shell: bash
        run: |
          set -euo pipefail
          curl -fL https://github.com/coursier/coursier/releases/latest/download/cs-x86_64-pc-linux.gz \
            | gunzip > cs
          chmod +x cs
          ./cs --version

      - name: Fetch Metals jars
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bundle/lib
          ./cs fetch "org.scalameta:metals_2.13:${{ matrix.version }}" \
            | while IFS= read -r jar; do
                [ -z "$jar" ] && continue
                cp "$jar" bundle/lib/
              done
          count=$(ls bundle/lib | wc -l)
          echo "Fetched $count jars"
          if [ "$count" -lt 1 ]; then
            echo "::error::No metals jars fetched for ${{ matrix.version }}"
            exit 1
          fi

      - name: Fetch Temurin JRE
        shell: bash
        run: |
          set -euo pipefail
          url="https://api.adoptium.net/v3/binary/latest/${{ inputs.jre_version }}/ga/${{ matrix.target.adoptium_os }}/${{ matrix.target.adoptium_arch }}/jre/hotspot/normal/eclipse"
          echo "GET $url"
          case "${{ matrix.target.adoptium_os }}" in
            windows) curl -sSfL -o jre.zip "$url" && ls -lh jre.zip ;;
            *)       curl -sSfL -o jre.tar.gz "$url" && ls -lh jre.tar.gz ;;
          esac

      - name: Unpack JRE
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p jre-staging
          case "${{ matrix.target.adoptium_os }}" in
            windows) unzip -q jre.zip -d jre-staging ;;
            *)       tar -xzf jre.tar.gz -C jre-staging ;;
          esac
          jre_root=$(find jre-staging -maxdepth 1 -mindepth 1 -type d | head -n1)
          if [ -z "$jre_root" ]; then
            echo "::error::JRE root not found in staging"
            ls jre-staging
            exit 1
          fi
          case "${{ matrix.target.adoptium_os }}" in
            mac)
              if [ -d "$jre_root/Contents/Home" ]; then
                mv "$jre_root/Contents/Home" bundle/jre
              else
                mv "$jre_root" bundle/jre
              fi
              ;;
            *)
              mv "$jre_root" bundle/jre
              ;;
          esac
          if [ ! -d bundle/jre/bin ]; then
            echo "::error::bundle/jre/bin missing"
            find bundle/jre -maxdepth 2 -type d
            exit 1
          fi

      - name: Write launcher scripts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bundle/bin
          if [ "${{ matrix.target.adoptium_os }}" = "windows" ]; then
            {
              printf '@echo off\r\n'
              printf 'setlocal\r\n'
              printf 'set "ROOT=%%~dp0.."\r\n'
              printf '"%%ROOT%%\\jre\\bin\\java.exe" -cp "%%ROOT%%\\lib\\*" scala.meta.metals.Main %%*\r\n'
            } > bundle/bin/metals.bat
          else
            {
              printf '#!/bin/sh\n'
              printf 'ROOT="$(cd "$(dirname "$0")/.." && pwd)"\n'
              printf 'exec "$ROOT/jre/bin/java" -cp "$ROOT/lib/*" scala.meta.metals.Main "$@"\n'
            } > bundle/bin/metals
            chmod +x bundle/bin/metals
          fi

      - name: Write manifest
        shell: bash
        run: |
          set -euo pipefail
          cat > bundle/page-bundle-manifest.json <<EOF
          {
            "metals_version": "${{ matrix.version }}",
            "jre_version": "${{ inputs.jre_version }}",
            "page_os": "${{ matrix.target.page_os }}",
            "page_arch": "${{ matrix.target.page_arch }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "built_by": "github-actions / ${{ github.workflow }} / ${{ github.run_id }}"
          }
          EOF

      - name: Pack bundle
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          outname="page-scala-metals-${{ matrix.target.page_os }}-${{ matrix.target.page_arch }}-${{ matrix.version }}.${{ matrix.target.ext }}"
          case "${{ matrix.target.ext }}" in
            tar.gz) tar -czf "$outname" -C bundle . ;;
            zip)    (cd bundle && zip -qr "../$outname" .) ;;
          esac
          ls -lh "$outname"
          echo "outname=$outname" >> "$GITHUB_OUTPUT"

      - name: Upload as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Metals bundles
          make_latest: false
          body: |
            Prebuilt Metals (Scala language server) bundles, auto-fetched by
            [PAGE IDE](https://github.com/monkshark/page-ide)'s `MetalsInstaller`.

            Each bundle is self-contained: it ships with an embedded Adoptium
            Temurin JRE plus the Metals jars (resolved from Maven Central via
            Coursier at build time). PAGE IDE invokes `bin/metals` (Unix) or
            `bin\metals.bat` (Windows); the bundled JRE is used directly so the
            user does not need a system JDK installed.

            See the repository [README](https://github.com/monkshark/page-ide-assets#readme).
          files: ${{ steps.pack.outputs.outname }}
          fail_on_unmatched_files: true
